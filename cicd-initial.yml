name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build app
        run: npm run build

  test_unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Run Vitest
        run: npx vitest run --reporter=verbose
  
  test_integration:
    name: Integration Tests             //this is just a name for the job.
    runs-on: ubuntu-latest              //runs on github-hosted ubuntu-latest runner. not docker container.
    needs: build                        //this job will only run if the 'build' job is successful.
    steps:
      - uses: actions/checkout@v4       //checkout the code from the repository.
      - uses: actions/setup-node@v4     //setup node.js environment.
        with:
          node-version: 22              //specify the node.js version to use.
      - name: Install dependencies      //install the project dependencies using npm ci command.
        run: npm ci
      - name: Install Playwright Browsers  //install the necessary browsers for Playwright testing.
        run: npx playwright install --with-deps
      - name: Run Playwright Tests      //run the integration tests using Playwright.
        run: npx playwright test

  deploy:
    name: Deploy (mock)
    runs-on: ubuntu-latest
    needs: [test_unit]
    container:
      image: alpine:latest
    steps:
      - name: Mock deployment
        run: echo 'Mock deployment was successful!'

